name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Compile all Python files
        run: python -m py_compile $(git ls-files '*.py')

      # Round-12 audit: ruff catches syntax / common-bug patterns before
      # CI exercises the tests. Config lives in pyproject.toml. Fails the
      # job on any rule match.
      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest with coverage
        # Coverage floor is the RATCHET baseline: current measured
        # coverage is ~19% (cloud_scheduler 3800 LOC with 4 tests +
        # handlers/*.py with 0 unit tests dominate the uncovered
        # fraction). Round-12 audit documents this as a known gap.
        # Nudge this value up in the same PR that adds a new test
        # suite so the ratchet only moves one direction.
        # test_trading_session_is_computed_live_not_from_stale_json
        # is still deselected (needs an Alpaca mock).
        run: |
          python -m pytest tests/ \
            --deselect tests/test_dashboard_data.py::test_trading_session_is_computed_live_not_from_stale_json \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=25 \
            --tb=short
