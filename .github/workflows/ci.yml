name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Compile all Python files
        run: python -m py_compile $(git ls-files '*.py')

      # Round-12 audit: ruff catches syntax / common-bug patterns before
      # CI exercises the tests. Config lives in pyproject.toml. Fails the
      # job on any rule match.
      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest with coverage
        # Coverage floor is the RATCHET baseline. Round-61 pt.6
        # built a mock WSGI harness for DashboardHandler that lets us
        # exercise every HTTP endpoint without a real socket. server.py
        # went 7% → 42%+, handlers/*.py went 0% → 13-44%. Total actual
        # coverage jumped 39.79% → 47.19%. Floor moved 36 → 45 to lock
        # the gain with a ~2% cushion.
        # Nudge UP again in any PR that adds a new test suite. Never
        # lower without a written PR justification — ratchet only
        # moves one direction.
        # test_trading_session_is_computed_live_not_from_stale_json
        # is still deselected (needs an Alpaca mock).
        run: |
          python -m pytest tests/ \
            --deselect tests/test_dashboard_data.py::test_trading_session_is_computed_live_not_from_stale_json \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            --tb=short

      # Round-61 pt.8 — JS test suite for templates/dashboard.html.
      # The dashboard ships ~7000 LOC of inline JS that pytest-cov
      # can't see. Vitest + jsdom drive the pure helpers (esc, jsStr,
      # fmtMoney, _occParse, parseSchedTs, etc.) so a regression in
      # the JS path can't sneak through Python-only CI.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Run vitest
        run: npm test
