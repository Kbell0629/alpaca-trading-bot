# Nixpacks build configuration for the Alpaca trading bot.
#
# Why this exists: numpy / pandas (pulled in transitively by yfinance,
# which powers the PEAD strategy) need the C++ standard runtime
# (libstdc++.so.6) at IMPORT time. Nixpacks' default Python image is
# slim and doesn't ship that lib, so `import yfinance` blew up with:
#   ImportError: libstdc++.so.6: cannot open shared object file
#
# Nixpacks distinguishes:
#   nixPkgs — packages available at BUILD time (gcc, etc.)
#   nixLibs — shared libs threaded into LD_LIBRARY_PATH at RUNTIME
# The first attempt put gcc in nixPkgs only; that gave us libstdc++
# during pip install but stripped it from the runtime image. Moving
# stdenv.cc.cc.lib into nixLibs is the canonical Nix pattern for
# "include just the C++ stdlib at runtime".
[phases.setup]
nixPkgs = ["python312", "gcc"]
nixLibs = ["stdenv.cc.cc.lib"]

[phases.install]
# Default install command — explicit because [phases.setup] would
# otherwise replace the auto-detected install logic.
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]
